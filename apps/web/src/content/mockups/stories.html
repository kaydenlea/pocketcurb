<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tracking-tightest { letter-spacing: -0.06em; }
        .glass-ios {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .text-shadow-premium {
            text-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }
        .animate-progress {
            animation: progress 5s linear forwards;
        }
        .ios-26-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white antialiased overflow-hidden select-none min-h-[100dvh]">
<!-- Immersive Background -->
<div class="fixed inset-0 z-0">
<img alt="premium candlelit dining table close up" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlQLGIdypEKv2Fqz9d875Z-j-cPuY7xw242BGOexPpidPJixuk0XAvK8poQ-cFw6LT8MzqTfb32lRcsP__WgwMjtr5BVml90JvLRJR8462WEaAwGBCR_eLan8Y6PCEISgVXitQ_lsl6LAjtqZFWgMPO1nXfk2wdbFoQAsZjEL7dJ0iYWwefGVNSiuFvDs3-nWKegqVkc33esMgwMiHStd3FOB5m7r33Fvm0dEXg_9XXrlp63R0M0da7P5F0W2AOEGufDZehAUX0JCf"/>
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/30 to-black/95"></div>
</div>
<!-- Header & Story Navigation -->
<header class="fixed top-0 w-full z-50 px-6 pt-8">
<div class="flex gap-1.5 w-full mb-5">
<div class="h-[2px] flex-1 bg-white rounded-full"></div>
<div class="h-[2px] flex-1 bg-white/30 rounded-full overflow-hidden">
<div class="h-full bg-white animate-progress"></div>
</div>
<div class="h-[2px] flex-1 bg-white/30 rounded-full"></div>
<div class="h-[2px] flex-1 bg-white/30 rounded-full"></div>
</div>
<div class="flex justify-between items-center">
<button class="w-10 h-10 flex items-center justify-start active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px] text-white">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold tracking-[0.3em] text-white uppercase">Weekly Review</span>
</div>
<button class="w-10 h-10 flex items-center justify-end active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px] text-white">more_horiz</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 h-full flex flex-col items-start px-10 pt-40">
<!-- Vertical Story Line (Visual Accent) -->
<div class="absolute left-6 top-64 bottom-60 w-[1px] bg-gradient-to-b from-white/0 via-white/20 to-white/0 flex flex-col items-center justify-center">
<div class="w-1 h-1 rounded-full bg-white ring-4 ring-white/10 mb-20"></div>
<div class="w-1 h-1 rounded-full border border-white/40"></div>
</div>
<!-- Category Label -->
<div class="mb-5 bg-white/10 backdrop-blur-md px-3 h-7 flex items-center rounded-full border border-white/10">
<span class="text-[10px] font-bold tracking-[0.1em] text-white/90 uppercase leading-none">Top Category</span>
</div>
<!-- Headline Group -->
<div class="mb-12 text-left">
<h1 class="text-white text-[72px] font-extrabold tracking-tightest leading-[1.0] mb-4 text-shadow-premium">Dining.</h1>
<p class="text-white/90 text-[18px] font-normal max-w-[280px] italic leading-[1.45] tracking-wide">
                A week of savoring moments over shared plates and meaningful conversations.
            </p>
</div>
<!-- Budget Impact Card -->
<div class="glass-ios w-full max-w-[320px] p-8 rounded-[2.5rem] flex flex-col gap-6 mb-12">
<div class="flex flex-col w-full">
<p class="text-white/40 text-[10px] font-bold tracking-[0.2em] uppercase mb-1.5">Budget Impact</p>
<div class="flex justify-between items-center w-full">
<p class="text-white text-[48px] font-bold tracking-tightest leading-none">$482.50</p>
<div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-[24px] translate-y-0.5">
      🍴
    </div>
</div>
</div>
<div class="flex flex-col gap-6">
<div class="flex items-center gap-3">
<div class="h-5 px-2 bg-red-500/20 border border-red-500/30 rounded flex items-center">
<span class="text-red-400 text-[10px] font-extrabold tracking-widest uppercase">$32.50 OVER PLAN</span>
</div>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<button class="w-full bg-white text-black py-4 px-6 rounded-2xl flex items-center justify-center gap-2.5 shadow-xl shadow-black/40 active:scale-[0.97] transition-all hover:bg-white/90">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-[11px] font-extrabold tracking-[0.1em] uppercase">Adjust Budget to $450</span>
</button>
</div>
</div>
<!-- Presence Indicator (Side element) -->
<div class="self-end flex flex-col items-end gap-1 mb-8">
<span class="text-[9px] font-bold tracking-[0.15em] text-white/30 uppercase">Mindfulness</span>
<div class="flex items-center gap-3">
<p class="text-[14px] font-medium text-white/80">Presence over expense</p>
<div class="w-1 h-10 bg-white/10 rounded-full relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-[70%] bg-brand-green rounded-full"></div>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Section -->
<footer class="fixed bottom-10 left-0 w-full z-30 px-10 flex flex-col items-center gap-10">
<!-- Redesigned Secondary Nav - iOS 26 Aesthetic -->
<div class="w-full flex justify-between items-center">
<button class="flex items-center gap-2.5 px-6 py-3 rounded-full ios-26-glass active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white/80 text-[18px]">keyboard_arrow_up</span>
<span class="text-[9px] font-bold tracking-[0.2em] text-white/80 uppercase">Details</span>
</button>
<button class="flex items-center gap-2.5 px-6 py-3 rounded-full ios-26-glass active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white/80 text-[18px]">share</span>
<span class="text-[9px] font-bold tracking-[0.2em] text-white/80 uppercase">Share</span>
</button>
</div>
</footer>
</body></html>
