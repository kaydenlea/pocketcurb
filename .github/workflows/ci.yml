name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate PR Metadata
        if: github.event_name == 'pull_request'
        run: pnpm pr:metadata:check

      - name: Run Verification
        run: pnpm verify

      - name: Run Mobile Slice Verification
        run: pnpm verify:mobile

      - name: Run Web Slice Verification
        run: pnpm verify:web

      - name: Run Local Review Gate
        run: node ./scripts/local-review.mjs

      - name: Run Docs Check
        run: pnpm docs:check

      - name: Run pnpm Audit
        run: pnpm audit --audit-level=critical
