version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      workspace-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 3
